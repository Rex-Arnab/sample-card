<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Card - Landing Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }

    .card-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      font-weight: bold;
    }

    .card h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .card p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .features {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }

    .feature {
      flex: 1;
      padding: 0 8px;
    }

    .feature-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .feature h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 4px;
    }

    .feature p {
      font-size: 12px;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-logo">S</div>
    <h1>Welcome to Sample Card</h1>
    <p>A clean, minimal landing page to showcase your product or idea. Get started in seconds.</p>
    <a href="#" class="btn">Get Started</a>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <h3>Fast</h3>
        <p>Lightning quick load times</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🎨</div>
        <h3>Beautiful</h3>
        <p>Modern, clean design</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <h3>Secure</h3>
        <p>Built with safety in mind</p>
      </div>
    </div>
  </div>
</body>
</html>
